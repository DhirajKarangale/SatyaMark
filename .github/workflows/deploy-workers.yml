name: Deploy Multi-Worker Architecture

on:
  push:
    branches: [main]
    paths:
      - 'AI/**'
      - '.github/workflows/**'

jobs:
  deploy-all-workers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4

      # ==========================================
      # 1. THE BUILD PHASE
      # ==========================================
      - name: Prepare Image Worker Build
        run: |
          mkdir -p image_build/AI
          
          # 1. Copy ONLY the files in the root of AI
          find AI -maxdepth 1 -type f -exec cp {} image_build/AI/ \;
          
          # 2. Explicitly copy ONLY the image folder
          cp -r AI/image image_build/AI/
          
          cat <<EOF > image_build/Dockerfile
          FROM python:3.11-slim
          ENV PYTHONDONTWRITEBYTECODE=1 PYTHONUNBUFFERED=1
          WORKDIR /app
          COPY . .
          RUN pip install --no-cache-dir -r AI/image/requirements.txt
          EXPOSE 7860
          CMD ["python", "AI/image/image_worker.py"]
          EOF
          
          cat <<EOF > image_build/README.md
          ---
          title: Satyamark Image Worker
          sdk: docker
          app_port: 7860
          ---
          EOF
          
          # Initialize Git for Image Build
          cd image_build
          git init
          git branch -M main
          git config --global user.email "bot@satyamark.com"
          git config --global user.name "Satyamark-Bot"
          git add . && git commit -m "Auto-deploy Image Worker"

      - name: Prepare Phase 2 (Text) Worker Build
        run: |
          mkdir -p text_build/AI
          
          # 1. Copy ONLY the files in the root of AI
          find AI -maxdepth 1 -type f -exec cp {} text_build/AI/ \;
          
          # 2. Explicitly copy ONLY the text folder
          cp -r AI/text text_build/AI/
          
          cat <<EOF > text_build/Dockerfile
          FROM python:3.11-slim
          ENV PYTHONDONTWRITEBYTECODE=1 PYTHONUNBUFFERED=1
          WORKDIR /app
          COPY . .
          RUN pip install --no-cache-dir -r AI/text/requirements.txt
          EXPOSE 7860
          CMD ["python", "AI/text/starter/text_worker.py"] 
          EOF
          
          cat <<EOF > text_build/README.md
          ---
          title: Satyamark Text Worker
          sdk: docker
          app_port: 7860
          ---
          EOF
          
          # Initialize Git for Text Build
          cd text_build
          git init
          git branch -M main
          git config --global user.email "bot@satyamark.com"
          git config --global user.name "Satyamark-Bot"
          git add . && git commit -m "Auto-deploy Phase 2 Worker"

      # ==========================================
      # 2. THE DEPLOYMENT PHASE (Staggered by Account)
      # ==========================================
      - name: Deploy Primary Cluster (Account 1 - DKode02)
        run: |
          # Push to Account 1: Image Space
          cd ${{ github.workspace }}/image_build
          git push --force https://DKode02:${{ secrets.HF_TOKEN_ACC1 }}@huggingface.co/spaces/DKode02/satyamark-image-worker main
          
          # Push to Account 1: Text Space
          cd ${{ github.workspace }}/text_build
          git push --force https://DKode02:${{ secrets.HF_TOKEN_ACC1 }}@huggingface.co/spaces/DKode02/satyamark-text-worker main

      - name: Pipeline Delay
        run: |
          echo "Waiting 15 seconds for Account 1 to initialize before pushing Account 2..."
          sleep 12

      - name: Deploy Secondary Cluster (Account 2 - dhirajk02)
        run: |
          # Push to Account 2: Image Space
          cd ${{ github.workspace }}/image_build
          git push --force https://dhirajk02:${{ secrets.HF_TOKEN_ACC2 }}@huggingface.co/spaces/dhirajk02/satyamark-image-worker main
          
          # Push to Account 2: Text Space
          cd ${{ github.workspace }}/text_build
          git push --force https://dhirajk02:${{ secrets.HF_TOKEN_ACC2 }}@huggingface.co/spaces/dhirajk02/satyamark-text-worker main