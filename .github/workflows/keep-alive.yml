name: SatyaMark Worker Keep-Alive

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: npm init -y && npm install playwright

      - name: Ping with Headless Browser
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            // Replace with your actual HF Space URL
            await page.goto('https://dkode02-satyamark-text-worker.hf.space/health', { waitUntil: 'networkidle' });
            console.log('Successfully loaded the page like a real user!');
            await browser.close();
          })();
          "