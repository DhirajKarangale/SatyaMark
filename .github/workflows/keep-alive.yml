name: SatyaMark Workers Keep-Alive

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  # Allows you to trigger the workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  ping-workers:
    runs-on: ubuntu-latest
    steps:
      - name: Initialize Project & Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Ping All Workers with Headless Browser
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const urls = [
              'https://dkode02-satyamark-text-worker.hf.space/health',
              'https://dkode02-satyamark-image-worker.hf.space/health',
              'https://dhirajk02-satyamark-text-worker.hf.space/health',
              'https://dhirajk02-satyamark-image-worker.hf.space/health'
            ];
            
            console.log('Starting Playwright keep-alive script...');
            const browser = await chromium.launch();
            const page = await browser.newPage();
            
            for (const url of urls) {
              try {
                console.log('Pinging: ' + url);
                // 15-second timeout per URL to prevent the action from hanging
                await page.goto(url, { waitUntil: 'networkidle', timeout: 15000 });
                console.log('Successfully loaded: ' + url);
              } catch (error) {
                console.error('Failed to load ' + url + ' : ' + error.message);
              }
            }
            
            await browser.close();
            console.log('All workers pinged.');
          })();
          "